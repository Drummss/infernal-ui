name: Quality

on:
  pull_request:
    branches:
      - main

jobs:
  checks:
    name: Quality Checks
    if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Typecheck + Build Pipeline
        run: pnpm ci:check

      - name: Run Lint
        run: pnpm lint
